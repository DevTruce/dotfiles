name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    # Reacts to commits landing on main - unlike lint.yml/test.yml this doesn't need to
    # run on pull_request, only on push, since it maintains a standing release PR rather
    # than validating one.
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json
