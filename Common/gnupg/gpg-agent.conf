# ─────────────────────────────────────────
# GPG Agent Configuration
# ─────────────────────────────────────────

# -- Cache TTL

# 8 hours active session / 24 hours maximum
default-cache-ttl 28800
max-cache-ttl 86400

# -- Pinentry

# pinentry-curses for terminal passphrase prompts (Linux/WSL)
# macOS uses pinentry-mac — this file is overwritten by install.sh with the correct path
pinentry-program /usr/bin/pinentry-curses
